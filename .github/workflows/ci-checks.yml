name: ci-checks

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main-validate:
    name: ci/main-validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install --include=optional

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Audit
        run: npm run audit
